<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <defs>
    <linearGradient id="body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6FF4A"/>
      <stop offset="100%" stop-color="#B8E600"/>
    </linearGradient>
    <linearGradient id="head-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <radialGradient id="eye-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D1FF00"/>
      <stop offset="60%" stop-color="#D1FF00" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#D1FF00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Antena -->
  <line x1="100" y1="18" x2="100" y2="38" stroke="#D1FF00" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="14" r="6" fill="#D1FF00"/>
  <circle cx="100" cy="14" r="10" fill="#D1FF00" opacity="0.25"/>

  <!-- Corpo (roupa verde-limão) -->
  <rect x="42" y="118" width="116" height="86" rx="22" fill="url(#body-grad)" stroke="#0a0a0a" stroke-width="2.5"/>

  <!-- Sombra do peito -->
  <rect x="42" y="118" width="116" height="18" rx="22" fill="#000" opacity="0.08"/>

  <!-- Logo AIOX no peito (X estilizado) -->
  <g transform="translate(70, 146)">
    <rect x="-4" y="-4" width="68" height="38" rx="6" fill="#0a0a0a"/>
    <!-- X do logo -->
    <path d="M4 4 L26 26 M26 4 L4 26" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <!-- | I -->
    <line x1="34" y1="4" x2="34" y2="26" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <!-- A triangular mark -->
    <path d="M42 26 L48 4 L54 26 M44.5 18 L51.5 18" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Braços -->
  <rect x="20" y="130" width="18" height="54" rx="9" fill="url(#body-grad)" stroke="#0a0a0a" stroke-width="2.5"/>
  <rect x="162" y="130" width="18" height="54" rx="9" fill="url(#body-grad)" stroke="#0a0a0a" stroke-width="2.5"/>
  <!-- Mãos -->
  <circle cx="29" cy="188" r="10" fill="#0a0a0a"/>
  <circle cx="171" cy="188" r="10" fill="#0a0a0a"/>

  <!-- Cabeça -->
  <rect x="48" y="38" width="104" height="86" rx="26" fill="url(#head-grad)" stroke="#D1FF00" stroke-width="2.5"/>

  <!-- Painel da cabeça -->
  <rect x="60" y="56" width="80" height="50" rx="14" fill="#000" stroke="rgba(209,255,0,0.3)" stroke-width="1.5"/>

  <!-- Olhos brilhantes -->
  <circle cx="82" cy="82" r="14" fill="url(#eye-glow)"/>
  <circle cx="118" cy="82" r="14" fill="url(#eye-glow)"/>
  <circle cx="82" cy="82" r="6" fill="#D1FF00"/>
  <circle cx="118" cy="82" r="6" fill="#D1FF00"/>
  <!-- Reflexo nos olhos -->
  <circle cx="85" cy="79" r="2" fill="#fff"/>
  <circle cx="121" cy="79" r="2" fill="#fff"/>

  <!-- "Boca" — linha de LEDs -->
  <rect x="78" y="108" width="44" height="4" rx="2" fill="#D1FF00" opacity="0.35"/>
  <rect x="82" y="108" width="4" height="4" fill="#D1FF00"/>
  <rect x="92" y="108" width="4" height="4" fill="#D1FF00"/>
  <rect x="102" y="108" width="4" height="4" fill="#D1FF00"/>
  <rect x="112" y="108" width="4" height="4" fill="#D1FF00"/>

  <!-- Orelhas/sensores laterais -->
  <rect x="40" y="68" width="8" height="22" rx="3" fill="#D1FF00"/>
  <rect x="152" y="68" width="8" height="22" rx="3" fill="#D1FF00"/>
</svg>
